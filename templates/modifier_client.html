{% extends "base.html" %}
{% block content %}

<h1>Modifier le client</h1>

<style>
    .ce-field {
        min-height: 44px;
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        padding: 10px 14px;
        background: #fff;
        outline: none;
    }
    .ce-field:focus {
        border-color: #111827;
        box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.08);
    }
    .ce-field:empty::before {
        content: attr(data-placeholder);
        color: #64748b;
    }
</style>

<div class="card" style="max-width:560px;">
    <form method="POST" class="form-vertical" autocomplete="off" onsubmit="syncClientFormFields(this)">
        <input type="text" name="fake_username" autocomplete="username" tabindex="-1" style="position:absolute; left:-9999px; width:1px; height:1px; opacity:0;">
        <input type="password" name="fake_password" autocomplete="new-password" tabindex="-1" style="position:absolute; left:-9999px; width:1px; height:1px; opacity:0;">
        <input type="hidden" name="nom" value="{{ client['nom'] }}">
        <input type="hidden" name="email" value="{{ client['email'] }}">
        <input type="hidden" name="telephone" value="{{ client['telephone'] }}">
        <input type="hidden" name="site_web" value="{{ client['site_web'] }}">
        <div>
            <label>Nom</label>
            <div class="ce-field" contenteditable="true" data-field="nom" data-placeholder="Nom du client" tabindex="0">{{ client['nom'] or '' }}</div>
        </div>

        <div>
            <label>Email</label>
            <div class="ce-field" contenteditable="true" data-field="email" data-placeholder="Email" tabindex="0">{{ client['email'] or '' }}</div>
        </div>

        <div>
            <label>Téléphone</label>
            <div class="ce-field" contenteditable="true" data-field="telephone" data-placeholder="Téléphone" tabindex="0">{{ client['telephone'] or '' }}</div>
        </div>

        <div>
            <label>Site web</label>
            <div class="ce-field" contenteditable="true" data-field="site_web" data-placeholder="Site web" tabindex="0">{{ client['site_web'] or '' }}</div>
        </div>

        <div>
            <label>Rythme horaire</label>
            <select name="rythme_horaire">
                {% for rythme in rythme_options %}
                    <option value="{{ rythme }}" {% if client['rythme_horaire'] == rythme %}selected{% endif %}>{{ rythme }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-top:8px; display:flex; gap:10px; align-items:center;">
            <button type="submit" class="btn-primary">Enregistrer</button>
            <a href="/clients" class="btn-secondary">Retour</a>
        </div>
    </form>
</div>

<script>
    function syncClientFormFields(form) {
        const get = (field) => {
            const el = form.querySelector(`.ce-field[data-field="${field}"]`);
            return (el?.textContent || "").trim();
        };

        form.elements.nom.value = get("nom");
        form.elements.email.value = get("email");
        form.elements.telephone.value = get("telephone");
        form.elements.site_web.value = get("site_web");

        if (!form.elements.nom.value) {
            alert("Le nom du client est obligatoire.");
            return false;
        }
        return true;
    }
</script>

{% endblock %}
