{% extends "base.html" %}
{% block content %}

<h1 style="margin-bottom:30px;">Nouvel équipement</h1>

<form action="/equipements/nouveau" 
      method="POST" 
      enctype="multipart/form-data" 
      class="form">
      <form method="POST" autocomplete="off">

    <!-- Nom pleine largeur -->
    <div style="margin-bottom:20px;">
        <input type="text"
               name="nom"
               placeholder="Nom de l'équipement"
               required
               style="width:100%;">
    </div>

    <!-- Bloc 1 -->
    <div class="form-row">

        <input type="text" name="code" placeholder="Code">

        <input type="text" name="type" placeholder="Type">

        <select name="statut">
            <option value="Opérationnel">Opérationnel</option>
            <option value="En maintenance">En maintenance</option>
            <option value="Hors service">Hors service</option>
        </select>

    </div>

    <!-- Bloc 2 -->
    <div class="form-row">

        <input type="text" name="emplacement" placeholder="Emplacement">

        <select name="client_id">
            <option value="">Client</option>
            {% for c in clients %}
                <option value="{{ c[0] }}">{{ c[1] }}</option>
            {% endfor %}
        </select>

        <input type="text" name="fabricant" placeholder="Fabricant">

    </div>

    <!-- Bloc 3 -->
    <div class="form-row">

        <input type="text" name="modele" placeholder="Modèle">

        <input type="text" name="numero_serie" placeholder="Numéro de série">

        <input type="date" name="date_installation">

    </div>

    <!-- Photo -->
    <div style="margin-top:20px;">
        <div style="margin-top:20px;">
    <label class="upload-btn">
        📷 Ajouter une photo
        <input type="file" name="photo" hidden onchange="updateFileName(this, 'photo-name')">
    </label>
    <div id="photo-name" class="file-name"></div>
</div>
    </div>

    <!-- Documents -->
    <div style="margin-top:15px;">
        <div style="margin-top:20px;">
    <label class="upload-btn">
        📎 Ajouter des documents
        <input type="file" name="documents" multiple hidden onchange="updateFileName(this, 'doc-name')">
    </label>
    <div id="doc-name" class="file-name"></div>
</div>
    </div>

    <!-- Actions -->
    <div class="actions-row" style="margin-top:25px; justify-content:flex-end;">

        <a href="/equipements"
           style="text-decoration:none; color:#64748b; margin-right:20px;">
            Annuler
        </a>

        <button type="submit" class="btn-primary">
            Créer l'équipement
        </button>

    </div>

</form>
<script>
function updateFileName(input, targetId) {
    const target = document.getElementById(targetId);

    if (input.files.length === 1) {
        target.textContent = input.files[0].name;
    } else if (input.files.length > 1) {
        target.textContent = input.files.length + " fichiers sélectionnés";
    } else {
        target.textContent = "";
    }
}
</script>

{% endblock %}
