{% extends "base.html" %}

{% block content %}

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:12px;">
    <h1 style="margin:0;">Gestion des techniciens</h1>
    <button type="button" class="btn-primary" onclick="openNewTechnicienModal()">Ajouter</button>
</div>

<div class="actions-row" style="margin-bottom:18px;">
    <div class="top-actions hidden" id="technicienActions">
        <button type="button" class="btn-primary" onclick="modifierTechnicien()">
            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M12 20h9"/>
                <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>
            </svg>
            Modifier
        </button>

        <button type="button" class="btn-danger" onclick="supprimerTechnicien()">
            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14H6L5 6"/>
                <path d="M10 11v6M14 11v6"/>
            </svg>
            Supprimer
        </button>
    </div>
</div>

<table>
    <tr>
        <th>Nom</th>
        <th>Prénom</th>
        <th>Code</th>
        <th>Spécialité</th>
        <th>Statut</th>
    </tr>

    {% for tech in techniciens %}
    <tr onclick="selectTech(this, {{ tech[0] }})">
        <td>{{ tech[1] }}</td>
        <td>{{ tech[2] }}</td>
        <td>{{ tech[3] }}</td>
        <td>{{ tech[4] }}</td>
        <td>{{ tech[5] }}</td>
    </tr>
    {% endfor %}
</table>

<style>
    .ce-field {
        min-height: 44px;
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        padding: 10px 14px;
        background: #fff;
        outline: none;
    }
    .ce-field:focus {
        border-color: #111827;
        box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.08);
    }
    .ce-field:empty::before {
        content: attr(data-placeholder);
        color: #64748b;
    }
</style>

<div id="newTechnicienModal" onclick="closeTechnicienModalOnBackdrop(event)" style="display:none; position:fixed; inset:0; z-index:1200; background:rgba(15, 23, 42, 0.35);">
    <div style="position:relative; width:min(1120px, 92vw); margin:24px auto; background:#fff; border-radius:22px; padding:30px 34px; max-height:calc(100vh - 48px); overflow:auto;">
        <button type="button" onclick="closeNewTechnicienModal()" aria-label="Fermer" style="position:absolute; top:20px; right:20px; border:none; background:transparent; font-size:38px; line-height:1; color:#334155; cursor:pointer;">×</button>

        <h1 style="margin-bottom:24px;">Nouveau technicien</h1>
        <hr style="border:none; border-top:1px solid #e2e8f0; margin:0 0 24px;">

        <form action="/techniciens/add" method="POST" class="form" autocomplete="off" onsubmit="syncTechnicienFormFields(this)">
            <input type="text" name="fake_username" autocomplete="username" tabindex="-1" style="position:absolute; left:-9999px; width:1px; height:1px; opacity:0;">
            <input type="password" name="fake_password" autocomplete="new-password" tabindex="-1" style="position:absolute; left:-9999px; width:1px; height:1px; opacity:0;">
            <input type="hidden" name="nom">
            <input type="hidden" name="prenom">
            <input type="hidden" name="code">
            <input type="hidden" name="specialite">

            <div class="form-row">
                <div>
                    <label style="display:block; margin-bottom:8px; font-weight:600;">Nom *</label>
                    <div class="ce-field" contenteditable="true" data-field="nom" data-placeholder="Nom du technicien" tabindex="0"></div>
                </div>
                <div>
                    <label style="display:block; margin-bottom:8px; font-weight:600;">Prénom *</label>
                    <div class="ce-field" contenteditable="true" data-field="prenom" data-placeholder="Prénom du technicien" tabindex="0"></div>
                </div>
            </div>

            <div class="form-row">
                <div>
                    <label style="display:block; margin-bottom:8px; font-weight:600;">Code *</label>
                    <div class="ce-field" contenteditable="true" data-field="code" data-placeholder="Code technicien" tabindex="0"></div>
                </div>
                <div>
                    <label style="display:block; margin-bottom:8px; font-weight:600;">Spécialité</label>
                    <div class="ce-field" contenteditable="true" data-field="specialite" data-placeholder="Spécialité" tabindex="0"></div>
                </div>
            </div>

            <div class="form-row">
                <div>
                    <label style="display:block; margin-bottom:8px; font-weight:600;">Statut</label>
                    <select name="statut">
                        <option value="Actif">Actif</option>
                        <option value="Inactif">Inactif</option>
                    </select>
                </div>
            </div>

            <div class="actions-row" style="margin-top:25px; justify-content:flex-end;">
                <button type="button" class="btn-secondary" onclick="closeNewTechnicienModal()">Annuler</button>
                <button type="submit" class="btn-primary">Créer le technicien</button>
            </div>
        </form>
    </div>
</div>

<script>
let selectedTechId = null;

function selectTech(row, id) {

    if (selectedTechId === id) {
        row.classList.remove("selected-row");
        selectedTechId = null;
        document.getElementById("technicienActions").classList.add("hidden");
        return;
    }

    document.querySelectorAll("table tr").forEach(tr => {
        tr.classList.remove("selected-row");
    });

    row.classList.add("selected-row");
    selectedTechId = id;

    document.getElementById("technicienActions").classList.remove("hidden");
}

function modifierTechnicien() {
    if (selectedTechId) {
        window.location.href = "/modifier_technicien/" + selectedTechId;
    }
}

function supprimerTechnicien() {
    if (selectedTechId && confirm("Confirmer la suppression ?")) {
        window.location.href = "/techniciens/delete/" + selectedTechId;
    }
}

function openNewTechnicienModal() {
    const modal = document.getElementById("newTechnicienModal");
    if (!modal) return;
    modal.style.display = "block";
    document.body.style.overflow = "hidden";
}

function closeNewTechnicienModal() {
    const modal = document.getElementById("newTechnicienModal");
    if (!modal) return;
    modal.style.display = "none";
    document.body.style.overflow = "";
}

function closeTechnicienModalOnBackdrop(event) {
    if (event.target && event.target.id === "newTechnicienModal") {
        closeNewTechnicienModal();
    }
}

document.addEventListener("keydown", function (event) {
    if (event.key === "Escape") closeNewTechnicienModal();
});

function syncTechnicienFormFields(form) {
    const get = (field) => {
        const el = form.querySelector(`.ce-field[data-field="${field}"]`);
        return (el?.textContent || "").trim();
    };

    form.elements.nom.value = get("nom");
    form.elements.prenom.value = get("prenom");
    form.elements.code.value = get("code");
    form.elements.specialite.value = get("specialite");

    if (!form.elements.nom.value || !form.elements.prenom.value || !form.elements.code.value) {
        alert("Nom, prénom et code sont obligatoires.");
        return false;
    }
    return true;
}
</script>

{% endblock %}
