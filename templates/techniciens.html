{% extends "base.html" %}

{% block content %}

<h1>Gestion des techniciens</h1>

<form action="/techniciens/add" method="POST" class="form">

    <div class="form-row">
        <input type="text" name="nom" placeholder="Nom" required autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
        <input type="text" name="prenom" placeholder="Prénom" required autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
        <input type="text" name="code" placeholder="Code" required autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
        <input type="text" name="specialite" placeholder="Spécialité" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">

        <select name="statut">
            <option value="Actif">Actif</option>
            <option value="Inactif">Inactif</option>
        </select>
    </div>

    <div class="actions-row">

        <button type="submit" class="btn-primary">
            Ajouter
        </button>

        <div class="top-actions hidden" id="technicienActions">
            <button type="button" class="btn-primary" onclick="modifierTechnicien()">
                <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M12 20h9"/>
                    <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>
                </svg>
                Modifier
            </button>

            <button type="button" class="btn-danger" onclick="supprimerTechnicien()">
                <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14H6L5 6"/>
                    <path d="M10 11v6M14 11v6"/>
                </svg>
                Supprimer
            </button>
        </div>

    </div>

</form>

<table>
    <tr>
        <th>Nom</th>
        <th>Prénom</th>
        <th>Code</th>
        <th>Spécialité</th>
        <th>Statut</th>
    </tr>

    {% for tech in techniciens %}
    <tr onclick="selectTech(this, {{ tech[0] }})">
        <td>{{ tech[1] }}</td>
        <td>{{ tech[2] }}</td>
        <td>{{ tech[3] }}</td>
        <td>{{ tech[4] }}</td>
        <td>{{ tech[5] }}</td>
    </tr>
    {% endfor %}
</table>

<script>
let selectedTechId = null;

function selectTech(row, id) {

    if (selectedTechId === id) {
        row.classList.remove("selected-row");
        selectedTechId = null;
        document.getElementById("technicienActions").classList.add("hidden");
        return;
    }

    document.querySelectorAll("table tr").forEach(tr => {
        tr.classList.remove("selected-row");
    });

    row.classList.add("selected-row");
    selectedTechId = id;

    document.getElementById("technicienActions").classList.remove("hidden");
}

function modifierTechnicien() {
    if (selectedTechId) {
        window.location.href = "/modifier_technicien/" + selectedTechId;
    }
}

function supprimerTechnicien() {
    if (selectedTechId && confirm("Confirmer la suppression ?")) {
        window.location.href = "/techniciens/delete/" + selectedTechId;
    }
}
</script>

{% endblock %}
