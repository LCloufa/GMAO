<h1 style="margin-bottom:30px;">Nouvelle intervention</h1>

<form action="/interventions/add" method="POST" class="form-vertical">

    <div class="floating-group">
        <input type="text"
               name="title"
               placeholder=" "
               class="floating-input"
               required>
        <label class="floating-label">Titre de l'intervention *</label>
    </div>

    <div class="form-row">

        <div class="floating-group">
            <select name="equipment_id" required class="floating-input">
                <option value=""></option>
                {% for eq in equipements %}
                    <option value="{{ eq[0] }}">{{ eq[1] }}</option>
                {% endfor %}
            </select>
            <label class="floating-label">Équipement *</label>
        </div>

        <div class="floating-group">
            <select name="assigned_to" class="floating-input">
                <option value=""></option>
                {% for tech in techniciens %}
                    <option value="{{ tech[0] }}">{{ tech[1] }}</option>
                {% endfor %}
            </select>
            <label class="floating-label">Technicien assigné</label>
        </div>

    </div>

    <div class="form-row">

        <div class="floating-group">
            <select name="type" required class="floating-input">
                <option value="preventive">Préventive</option>
                <option value="corrective">Corrective</option>
                <option value="predictive">Prédictive</option>
                <option value="emergency">Urgence</option>
            </select>
            <label class="floating-label">Type d'intervention</label>
        </div>

        <div class="floating-group">
            <select name="priority" class="floating-input">
                <option value="low">Basse</option>
                <option value="medium" selected>Moyenne</option>
                <option value="high">Haute</option>
                <option value="critical">Critique</option>
            </select>
            <label class="floating-label">Priorité</label>
        </div>

    </div>

    <div class="form-row">

        <div class="floating-group">
            <input type="date"
                   name="scheduled_date"
                   class="floating-input"
                   placeholder=" "
                   required>
            <label class="floating-label">Date prévue *</label>
        </div>

        <div class="floating-group">
            <input type="time"
                   name="scheduled_time"
                   class="floating-input"
                   placeholder=" ">
            <label class="floating-label">Heure prévue</label>
        </div>

        <div class="floating-group">
            <input type="number"
                   name="estimated_duration_hours"
                   step="0.01"
                   min="0"
                   placeholder=" "
                   class="floating-input"
                   required>
            <label class="floating-label">Durée estimée (heures)</label>
        </div>

    </div>

    <div class="floating-group">
        <textarea name="description"
                  rows="4"
                  placeholder=" "
                  class="floating-input"></textarea>
        <label class="floating-label">Description</label>
    </div>

    <div class="form-actions">
        <button type="button" class="btn-secondary" onclick="closeDrawer()">
            Annuler
        </button>

        <button type="submit" class="btn-primary">
            Créer l'intervention
        </button>
    </div>

</form>
