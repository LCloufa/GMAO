{% extends "base.html" %}
{% block content %}

<h1 style="margin-bottom:30px;">Nouvelle intervention</h1>

<form action="/interventions/add" method="POST" class="form">

    <!-- Titre pleine largeur -->
    <div style="margin-bottom:20px;">
        <input type="text"
               name="title"
               placeholder="Titre de l'intervention"
               required
               style="width:100%;">
    </div>

    <!-- Bloc 1 -->
    <div class="form-row">

        <select name="equipment_id" required>
            <option value="">Équipement</option>
            {% for eq in equipements %}
                <option value="{{ eq[0] }}">{{ eq[1] }}</option>
            {% endfor %}
        </select>

        <select name="assigned_to">
            <option value="">Technicien</option>
            {% for tech in techniciens %}
                <option value="{{ tech[0] }}">{{ tech[1] }}</option>
            {% endfor %}
        </select>

    </div>

    <!-- Bloc 2 -->
    <div class="form-row">

        <select name="type" required>
            <option value="preventive">Préventive</option>
            <option value="corrective">Corrective</option>
            <option value="predictive">Prédictive</option>
            <option value="emergency">Urgence</option>
        </select>

        <select name="priority">
            <option value="low">Basse</option>
            <option value="medium" selected>Moyenne</option>
            <option value="high">Haute</option>
            <option value="critical">Critique</option>
        </select>

    </div>

    <!-- Bloc 3 -->
    <div class="form-row">

        <input type="date" name="scheduled_date" required>

        <input type="time" name="scheduled_time">

        <input type="number"
               name="estimated_duration_hours"
               placeholder="Durée (heures)"
               step="0.01"
               min="0"
               required>

    </div>

    <!-- Description pleine largeur -->
    <div style="margin-top:20px;">
        <textarea name="description"
                  placeholder="Description de l'intervention..."
                  rows="4"
                  style="width:100%; padding:10px; border-radius:8px; border:1px solid #e2e8f0;"></textarea>
    </div>

    <!-- Actions -->
    <div class="actions-row" style="margin-top:25px; justify-content:flex-end;">

        <a href="/interventions"
           style="text-decoration:none; color:#64748b; margin-right:20px;">
            Annuler
        </a>

        <button type="submit" class="btn-primary">
            Créer l'intervention
        </button>

    </div>

</form>

{% endblock %}
